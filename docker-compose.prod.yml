services:
  timescaledb:
    image: timescale/timescaledb:2.25.0-pg17
    container_name: timescaledb
    environment:
      POSTGRES_USER: ${DB_USER:-infoclimat}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-infoclimat2026}
      POSTGRES_DB: ${DB_NAME:-meteodb}
    volumes:
      - timescaledb-data:/var/lib/postgresql/data
    networks:
      - bd_net
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-infoclimat} -d ${DB_NAME:-meteodb}"]
      interval: 10s
      timeout: 20s
      retries: 10
      start_period: 40s
    restart: unless-stopped

  backend:
    build:
      context: ./backend
      args:
        PYTHON_BUILD_IMAGE: dhi.io/python:3.14-dev
        PYTHON_RUNTIME_IMAGE: dhi.io/python:3.14
    image: infoclimat-backend:prod
    env_file:
      - ./.env
    depends_on:
      timescaledb:
        condition: service_healthy
    networks:
      - app_net
      - bd_net
    restart: unless-stopped

  frontend:
    build:
      context: ./frontend
      args:
        NODE_BUILD_IMAGE: dhi.io/node:24-dev
        NODE_RUNTIME_IMAGE: dhi.io/node:24
    image: infoclimat-frontend:prod
    env_file:
      - ./.env
    networks:
      - app_net
    restart: unless-stopped

  nginx:
    image: nginx:1.29.5-alpine3.23-perl
    ports:
      - "8080:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - frontend
      - backend
    networks:
      - app_net
    restart: unless-stopped

  prometheus:
    image: prom/prometheus:v3.7.2
    container_name: prometheus
    command:
      - --config.file=/etc/prometheus/prometheus.yml
      - --storage.tsdb.path=/prometheus
    volumes:
      - ./monitoring/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus-data:/prometheus
    ports:
      - "9090:9090"
    depends_on:
      - backend
    networks:
      - app_net
    restart: unless-stopped

  grafana:
    image: grafana/grafana:12.2.0
    container_name: grafana
    environment:
      GF_SECURITY_ADMIN_USER: admin
      GF_SECURITY_ADMIN_PASSWORD: admin
    volumes:
      - ./monitoring/grafana/provisioning:/etc/grafana/provisioning:ro
      - ./monitoring/grafana/dashboards:/var/lib/grafana/dashboards:ro
      - grafana-data:/var/lib/grafana
    ports:
      - "3000:3000"
    depends_on:
      - prometheus
    networks:
      - app_net
    restart: unless-stopped

volumes:
  timescaledb-data:
    driver: local
  prometheus-data:
    driver: local
  grafana-data:
    driver: local

networks:
  app_net:
  bd_net:
