name: CI Pipeline

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

on:
  push:
    branches: ["*"]
  pull_request:

jobs:
  frontend:
    name: Frontend
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "24"

      - name: Install frontend dependencies
        working-directory: frontend
        run: npm ci

      - name: Run frontend tests
        working-directory: frontend
        run: npx vitest run --no-file-parallelism --reporter=default --reporter=junit --outputFile=test-report.xml

      - name: Run frontend lint
        working-directory: frontend
        run: npm run lint

      - name: Frontend security audit
        working-directory: frontend
        continue-on-error: true
        run: npm audit --audit-level=high || true

      - name: Upload frontend test report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: frontend-test-report
          path: frontend/test-report.xml
          if-no-files-found: ignore

  backend:
    name: Backend
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:15
        ports:
          - 5432:5432
        env:
          POSTGRES_DB: test_db
          POSTGRES_USER: test_user
          POSTGRES_PASSWORD: test_pass
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v4
        with:
          python-version: "3.11"

      - name: Install uv
        uses: astral-sh/setup-uv@v7

      - name: Install backend dependencies
        working-directory: backend
        run: |
          uv sync --locked --extra dev
          uv run pip install safety

      - name: Wait for Postgres (localhost)
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y postgresql-client
          for i in {1..60}; do
            pg_isready -h 127.0.0.1 -p 5432 && break || sleep 1
          done

      - name: Run backend tests
        working-directory: backend
        env:
          DB_HOST: 127.0.0.1
          DB_PORT: 5432
          DB_NAME: test_db
          DB_USER: test_user
          DB_PASSWORD: test_pass
        run: |
          mkdir -p ../reports/backend
          uv run pytest --junitxml=../reports/backend/pytest-report.xml -vv

      - name: Upload backend test report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: backend-tests
          path: reports/backend/pytest-report.xml

      - name: Run backend linter
        working-directory: backend
        run: uv run ruff check .

      - name: Fix formatting with ruff
        if: failure()
        working-directory: backend
        run: uv run ruff format --fix --exit-zero

      - name: Backend security scan
        working-directory: backend
        run: |
          mkdir -p ../reports/security
          uv run pip install bandit pip-audit
          uv run bandit -r weather -f json -o ../reports/security/bandit-report.json || true
          uv run pip-audit --format=json --output=../reports/security/pip-audit-report.json || true

      - name: Upload security scan reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: security-scans
          path: reports/security/

  docker-build:
    name: Build & Push Docker images
    runs-on: ubuntu-latest
    needs: [frontend, backend]

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Log in to GHCR
        if: github.ref == 'refs/heads/main'
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build backend Docker image
        run: docker build -t ghcr.io/lydia-bedri/infoclimat/infoclimat-backend:latest ./backend

      - name: Build frontend Docker image
        run: docker build -t ghcr.io/lydia-bedri/infoclimat/infoclimat-frontend:latest ./frontend

      - name: Push backend image
        if: github.ref == 'refs/heads/main'
        run: docker push ghcr.io/lydia-bedri/infoclimat/infoclimat-backend:latest

      - name: Push frontend image
        if: github.ref == 'refs/heads/main'
        run: docker push ghcr.io/lydia-bedri/infoclimat/infoclimat-frontend:latest

      - name: Install Trivy
        run: |
          curl -sfL https://raw.githubusercontent.com/aquasecurity/trivy/main/contrib/install.sh | sudo sh -s -- -b /usr/local/bin v0.69.3
          trivy --version

      - name: Scan backend image with Trivy (JSON)
        run: |
          mkdir -p reports/trivy
          trivy image -f json -o reports/trivy/trivy-backend.json ghcr.io/lydia-bedri/infoclimat/infoclimat-backend:latest

      - name: Scan frontend image with Trivy (JSON)
        run: |
          mkdir -p reports/trivy
          trivy image -f json -o reports/trivy/trivy-frontend.json ghcr.io/lydia-bedri/infoclimat/infoclimat-frontend:latest

      - name: Generate OpenVEX reports from Trivy JSON
        run: |
          python3 - <<'PY'
          import datetime
          import json
          import uuid
          from pathlib import Path

          def build_openvex(json_path: str, vex_path: str, fallback_product: str) -> None:
            report = json.loads(Path(json_path).read_text())
            seen = set()
            statements = []

            for result in report.get("Results", []):
              for vuln in (result.get("Vulnerabilities") or []):
                vuln_id = vuln.get("VulnerabilityID")
                purl = (vuln.get("PkgIdentifier") or {}).get("PURL")
                if not vuln_id:
                  continue

                product_id = purl or fallback_product
                key = (vuln_id, product_id)
                if key in seen:
                  continue
                seen.add(key)

                statements.append(
                  {
                    "vulnerability": {"name": vuln_id},
                    "products": [{"@id": product_id}],
                    "status": "affected",
                    "justification": "component_found",
                  }
                )

            openvex = {
              "@context": "https://openvex.dev/ns/v0.2.0",
              "@id": f"urn:uuid:{uuid.uuid4()}",
              "author": "InfoClimat CI (Trivy)",
              "timestamp": datetime.datetime.now(datetime.timezone.utc)
              .replace(microsecond=0)
              .isoformat()
              .replace("+00:00", "Z"),
              "version": 1,
              "statements": statements,
            }

            Path(vex_path).write_text(json.dumps(openvex, indent=2) + "\n")

          build_openvex(
            "reports/trivy/trivy-backend.json",
            "reports/trivy/trivy-backend.vex",
            "pkg:oci/ghcr.io/lydia-bedri/infoclimat/infoclimat-backend@latest",
          )

          build_openvex(
            "reports/trivy/trivy-frontend.json",
            "reports/trivy/trivy-frontend.vex",
            "pkg:oci/ghcr.io/lydia-bedri/infoclimat/infoclimat-frontend@latest",
          )
          PY

      - name: Upload Docker scan reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: docker-scans
          path: reports/trivy/
