name: CI Pipeline

on:
  push:
    branches: ["*"]
  pull_request:

jobs:
  frontend:
    name: Frontend
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '24'

      - name: Install frontend dependencies
        working-directory: frontend
        run: npm ci

      - name: Run frontend tests
        working-directory: frontend
        run: npm run test:ci

      - name: Run frontend lint
        working-directory: frontend
        run: npm run lint

      - name: Frontend security audit
        working-directory: frontend
        continue-on-error: true
        run: npm audit --audit-level=high || true

  backend:
    name: Backend
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:15
        ports:
          - 5432:5432
        env:
          POSTGRES_DB: test_db
          POSTGRES_USER: test_user
          POSTGRES_PASSWORD: test_pass
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'

      - name: Install uv
        uses: astral-sh/setup-uv@v7

      - name: Install backend dependencies
        working-directory: backend
        run: uv sync --locked --extra dev

      - name: Run backend tests
        working-directory: backend
        env:
          DB_HOST: postgres
          DB_PORT: 5432
          DB_NAME: test_db
          DB_USER: test_user
          DB_PASSWORD: test_pass
        run: uv run pytest -q

      - name: Run backend linter
        working-directory: backend
        run: |
          uv run ruff check .
          uv run ruff format --check .

      - name: Backend security scan
        working-directory: backend
        run: uv run safety check

  docker-build:
    name: Build & Push Docker images
    runs-on: ubuntu-latest
    needs: [frontend, backend]

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Build backend Docker image
        run: docker build -t infoclimat-backend ./backend

      - name: Build frontend Docker image
        run: docker build -t infoclimat-frontend ./frontend

      - name: Login to Docker Hub
        if: github.ref == 'refs/heads/main'
        run: docker login -u ${{ secrets.DOCKER_USERNAME }} -p ${{ secrets.DOCKER_PASSWORD }}

      - name: Tag images
        if: github.ref == 'refs/heads/main'
        run: |
          docker tag infoclimat-backend ${{ secrets.DOCKER_USERNAME }}/infoclimat-backend:latest
          docker tag infoclimat-frontend ${{ secrets.DOCKER_USERNAME }}/infoclimat-frontend:latest

      - name: Push images
        if: github.ref == 'refs/heads/main'
        run: |
          docker push ${{ secrets.DOCKER_USERNAME }}/infoclimat-backend:latest
          docker push ${{ secrets.DOCKER_USERNAME }}/infoclimat-frontend:latest
