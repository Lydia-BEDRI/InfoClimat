name: CI Pipeline

on:
  push:
    branches: ["*"]
  pull_request:

jobs:
  frontend:
    name: Frontend
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '24'

      - name: Install frontend dependencies
        working-directory: frontend
        run: npm ci

      - name: Run frontend tests
        working-directory: frontend
        run: npm run test:ci

      - name: Run frontend lint
        working-directory: frontend
        run: npm run lint

      - name: Frontend security audit
        working-directory: frontend
        continue-on-error: true
        run: npm audit --audit-level=high || true

      - name: Upload frontend test report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: frontend-test-report
          path: frontend/test-report.xml

  backend:
    name: Backend
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:15
        ports:
          - 5432:5432
        env:
          POSTGRES_DB: test_db
          POSTGRES_USER: test_user
          POSTGRES_PASSWORD: test_pass
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'

      - name: Install uv
        uses: astral-sh/setup-uv@v7

      - name: Install backend dependencies
        working-directory: backend
        run: |
          uv sync --locked --extra dev
          uv run pip install safety

      - name: Wait for Postgres (localhost)
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y postgresql-client
          for i in {1..60}; do
            pg_isready -h 127.0.0.1 -p 5432 && break || sleep 1
          done

      - name: Run backend tests
        working-directory: backend
        env:
          DB_HOST: 127.0.0.1
          DB_PORT: 5432
          DB_NAME: test_db
          DB_USER: test_user
          DB_PASSWORD: test_pass
        run: |
          mkdir -p reports
          uv run pytest --junitxml=reports/pytest-report.xml -vv

      - name: Upload test report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-report
          path: backend/reports/pytest-report.xml

      - name: Run backend linter
        working-directory: backend
        run: uv run ruff check .

      - name: Fix formatting with ruff
        if: failure()
        working-directory: backend
        run: uv run ruff format --fix

      - name: Backend security scan
        working-directory: backend
        run: |
          mkdir -p reports
          uv run pip install bandit pip-audit
          uv run bandit -r weather -f json -o reports/bandit-report.json || true
          uv run pip-audit --format=json --output=reports/pip-audit-report.json || true

      - name: Upload security reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: security-reports
          path: |
            backend/reports/bandit-report.json
            backend/reports/pip-audit-report.json

  docker-build:
    name: Build & Push Docker images
    runs-on: ubuntu-latest
    needs: [frontend, backend]

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Log in to GHCR
        if: github.ref == 'refs/heads/main'
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build backend Docker image
        run: docker build -t ghcr.io/lydia-bedri/infoclimat/infoclimat-backend:latest ./backend

      - name: Build frontend Docker image
        run: docker build -t ghcr.io/lydia-bedri/infoclimat/infoclimat-frontend:latest ./frontend

      - name: Push backend image
        if: github.ref == 'refs/heads/main'
        run: docker push ghcr.io/lydia-bedri/infoclimat/infoclimat-backend:latest

      - name: Push frontend image
        if: github.ref == 'refs/heads/main'
        run: docker push ghcr.io/lydia-bedri/infoclimat/infoclimat-frontend:latest

      - name: Scan backend image with Trivy (JSON + VEX)
        run: |
          sudo apt-get install -y wget
          wget https://github.com/aquasecurity/trivy/releases/latest/download/trivy_0.43.1_Linux-64bit.deb
          sudo dpkg -i trivy_0.43.1_Linux-64bit.deb
          mkdir -p backend/reports
          trivy image -f json -o backend/reports/trivy-backend.json ghcr.io/lydia-bedri/infoclimat/infoclimat-backend:latest
          trivy image -f vex -o backend/reports/trivy-backend.vex ghcr.io/lydia-bedri/infoclimat/infoclimat-backend:latest

      - name: Scan frontend image with Trivy (JSON + VEX)
        run: |
          mkdir -p frontend/reports
          trivy image -f json -o frontend/reports/trivy-frontend.json ghcr.io/lydia-bedri/infoclimat/infoclimat-frontend:latest
          trivy image -f vex -o frontend/reports/trivy-frontend.vex ghcr.io/lydia-bedri/infoclimat/infoclimat-frontend:latest

      - name: Upload Trivy reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: trivy-reports
          path: |
            backend/reports/trivy-backend.json
            backend/reports/trivy-backend.vex
            frontend/reports/trivy-frontend.json
            frontend/reports/trivy-frontend.vex
